<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plano ECC Barcelona</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f2f2f2;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    width:100%;
    display:flex;
    justify-content:center;
    padding:10px;
}

.map-wrapper{
    position:relative;
    width:100%;
    max-width:1486px;
}

.map-wrapper img{
    width:100%;
    display:block;
}

/* HOTSPOTS */

.hotspot{
    position:absolute;

    width:18px;
    height:18px;

    border-radius:50%;

    background:rgba(255,0,0,0.35);

    transform:translate(-50%, -50%);

    cursor:pointer;

    z-index:5;
}

/* MODAL */

.modal{
    display:none;

    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.6);

    justify-content:center;
    align-items:center;

    z-index:999;

    padding:20px;
}

.modal-content{
    background:white;

    width:100%;
    max-width:520px;

    border-radius:24px;

    padding:30px;

    position:relative;
}

.close{
    position:absolute;
    right:20px;
    top:12px;

    font-size:42px;
    font-weight:bold;

    cursor:pointer;
}

.modal h2{
    color:#0b36b5;
    margin-bottom:20px;
    font-size:36px;
}

.modal p{
    margin-bottom:14px;
    font-size:24px;
}

.buttons{
    display:flex;
    flex-direction:column;
    gap:14px;

    margin-top:26px;
}

.buttons a{
    text-decoration:none;
    color:white;

    text-align:center;

    padding:18px;

    border-radius:14px;

    font-size:26px;
    font-weight:bold;
}

.call{background:#1877f2;}
.whatsapp{background:#25d366;}
.email{background:#ff6f00;}

/* MOBILE */

@media(max-width:768px){

    .hotspot{
        width:14px;
        height:14px;
    }

    .modal h2{
        font-size:24px;
    }

    .modal p{
        font-size:17px;
    }

    .buttons a{
        font-size:20px;
        padding:16px;
    }
}

</style>
</head>

<body>

<div class="map-wrapper" id="mapWrapper">
