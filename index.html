<!DOCTYPE html>

<title>Plano ECC Barcelona</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f1f1f1;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    width:100%;
    display:flex;
    justify-content:center;
    padding:10px;
}

.plano-wrapper{
    position:relative;

    width:100%;
    max-width:1486px;

    aspect-ratio:1486 / 1059;
}

.plano{
    width:100%;
    height:100%;
    display:block;
}

/* HOTSPOTS */

.hotspot{
    position:absolute;

    width:20px;
    height:20px;

    border-radius:50%;

    background:rgba(255,0,0,0.35);

    transform:translate(-50%, -50%);

    cursor:pointer;

    z-index:10;
}

/* MODAL */

.modal{
    display:none;

    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.6);

    z-index:999;

    justify-content:center;
    align-items:center;

    padding:20px;
}

.modal-content{

    background:white;

    width:100%;
    max-width:520px;

    border-radius:24px;

    padding:30px;

    position:relative;
}

.close{
    position:absolute;
    right:20px;
    top:10px;

    font-size:42px;
    font-weight:bold;

    cursor:pointer;
}

.modal h2{
    color:#0d36b7;
    margin-bottom:20px;
    font-size:38px;
}

.modal p{
    margin-bottom:14px;
    font-size:26px;
}

.botones{
    margin-top:25px;

    display:flex;
    flex-direction:column;
    gap:14px;
}

.botones a{
    text-decoration:none;
    color:white;

    text-align:center;

    padding:18px;

    border-radius:14px;

    font-size:28px;
    font-weight:bold;
}

.llamar{
    background:#1877f2;
}

.whatsapp{
    background:#25d366;
}

.email{
    background:#ff6f00;
}

/* MOBILE */

@media(max-width:768px){

    .hotspot{
        width:14px;
        height:14px;
    }

    .modal h2{
        font-size:24px;
    }

    .modal p{
        font-size:17px;
    }

    .botones a{
        font-size:20px;
        padding:16px;
    }
}

</style>
</head>
