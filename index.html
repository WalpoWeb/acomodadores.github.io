<style>

body{
    margin:0;
    background:#ececec;
    font-family:Arial,sans-serif;
}

.container{

    position:relative;

    width:100%;
    max-width:1434px;

    margin:auto;
}

.plano{

    width:100%;
    display:block;
}

/* ========================= */
/* SVG AJUSTADO AL MARCO */
/* ========================= */

svg{

    position:absolute;

    top:2.1%;
    left:2.4%;

    width:95.2%;
    height:95.2%;
}

/* HOTSPOTS */

.hotspot{

    fill:red;

    opacity:.28;

    cursor:pointer;

    transition:.2s;

    transform-box: fill-box;
    transform-origin: center;
}

.hotspot:hover{
    opacity:.45;
}

/* POPUP */

.popup{

    position:fixed;

    left:50%;
    bottom:10px;

    transform:translateX(-50%);

    width:92%;
    max-width:430px;

    background:white;

    border-radius:22px;

    padding:22px;

    z-index:9999;

    display:none;

    box-shadow:0 0 30px rgba(0,0,0,.35);
}

.popup h2{

    margin-top:0;

    color:#003399;
}

.close{

    position:absolute;

    top:15px;
    right:20px;

    font-size:30px;

    cursor:pointer;

    font-weight:bold;
}

.info{

    line-height:1.8;

    margin-top:15px;
}

/* BOTONES */

.btn{

    display:block;

    text-align:center;

    text-decoration:none;

    color:white;

    font-weight:bold;

    padding:16px;

    border-radius:14px;

    margin-top:14px;

    font-size:22px;
}

.llamar{
    background:#1677ff;
}

.whatsapp{
    background:#28d146;
}

.email{
    background:#ff7300;
}

/* MOBILE */

@media(max-width:768px){

.popup{

    width:94%;

    padding:18px;
}

.btn{

    font-size:20px;
}

}

</style>

</head>

<script>

function mostrar(
nombre,
telefono,
email,
congregacion,
rol
){

document.getElementById("popup").style.display="block";

document.getElementById("nombre").innerHTML=nombre;

document.getElementById("rol").innerHTML=
"<b>Rol:</b> "+rol;

document.getElementById("congregacion").innerHTML=
"<b>Congregación:</b> "+congregacion;

document.getElementById("telefono").innerHTML=
"<b>Teléfono:</b> "+telefono;

document.getElementById("email").innerHTML=
"<b>Email:</b> "+email;

document.getElementById("btnLlamar").href=
"tel:"+telefono;

document.getElementById("btnWhatsapp").href=
"https://wa.me/"+telefono.replace(/\D/g,'');

document.getElementById("btnEmail").href=
"mailto:"+email;
}

function cerrar(){

document.getElementById("popup").style.display="none";
}

</script>
