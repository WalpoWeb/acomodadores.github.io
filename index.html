<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plano ECC Barcelona</title>

<style>

body{
    margin:0;
    padding:0;
    background:#f2f2f2;
    font-family:Arial, Helvetica, sans-serif;
}

#map-container{
    position:relative;
    width:100%;
    max-width:1486px;
    margin:auto;
}

#plano{
    width:100%;
    height:auto;
    display:block;
}

/* =========================
   HOTSPOTS INVISIBLES
========================= */

.hotspot{
    position:absolute;
    width:50px;
    height:50px;
    border-radius:50%;
    background:transparent;
    transform:translate(-50%, -50%);
    cursor:pointer;
    z-index:20;
}

/* =========================
   POPUP
========================= */

#popup{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%, -50%);
    background:white;
    width:90%;
    max-width:520px;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    display:none;
    z-index:9999;
}

#popup h2{
    margin-top:0;
    color:#0838c7;
    font-size:42px;
}

#popup p{
    font-size:28px;
    line-height:1.5;
}

.close-btn{
    position:absolute;
    top:15px;
    right:25px;
    font-size:42px;
    font-weight:bold;
    cursor:pointer;
}

.action-btn{
    display:block;
    width:100%;
    text-align:center;
    padding:22px;
    margin-top:20px;
    border-radius:18px;
    color:white;
    text-decoration:none;
    font-size:34px;
    font-weight:bold;
    box-sizing:border-box;
}

.call-btn{
    background:#1877f2;
}

.whatsapp-btn{
    background:#25D366;
}

.email-btn{
    background:#ff6d00;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

    #popup{
        width:92%;
        padding:22px;
    }

    #popup h2{
        font-size:24px;
    }

    #popup p{
        font-size:18px;
    }

    .action-btn{
        font-size:24px;
        padding:16px;
    }

    .close-btn{
        font-size:34px;
    }

    .hotspot{
        width:40px;
        height:40px;
    }
}

</style>
</head>

<div id="map-container">

const mapContainer =

    const point = document.createElement("div");

    point.className = "hotspot";

    point.style.left =

        p.nombre;

    document.getElementById("popup-role").innerText =
        p.rol;

    document.getElementById("popup-cong").innerText =
        p.congregacion;

    document.getElementById("popup-phone").innerText =
        p.telefono;

    document.getElementById("popup-email").innerText =
        p.email;

    document.getElementById("call-btn").href =
        "tel:+34" + p.telefono;

    document.getElementById("wa-btn").href =
        "https://wa.me/34" + p.telefono;

    document.getElementById("mail-btn").href =
        "mailto:" + p.email;

    document.getElementById("popup").style.display =
        "block";
}

function closePopup(){

    document.getElementById("popup").style.display =
        "none";
}
