<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plano ECC Barcelona</title>

<style>

body{
    margin:0;
    padding:0;
    background:#f2f2f2;
    font-family:Arial, Helvetica, sans-serif;
}

#map-container{
    position:relative;
    width:100%;
    max-width:1486px;
    margin:auto;
}

#plano{
    width:100%;
    height:auto;
    display:block;
}

/* HOTSPOTS */

.hotspot{
    position:absolute;
    width:22px;
    height:22px;
    border-radius:50%;
    background:rgba(255,0,0,0.35);
    transform:translate(-50%, -50%);
    cursor:pointer;
    z-index:20;
}

/* POPUP */

#popup{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%, -50%);
    background:white;
    width:90%;
    max-width:520px;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    display:none;
    z-index:9999;
}

#popup h2{
    margin-top:0;
    color:#0838c7;
    font-size:42px;
}

#popup p{
    font-size:28px;
    line-height:1.5;
}

.close-btn{
    position:absolute;
    top:15px;
    right:25px;
    font-size:42px;
    font-weight:bold;
    cursor:pointer;
}

.action-btn{
    display:block;
    width:100%;
    text-align:center;
    padding:22px;
    margin-top:20px;
    border-radius:18px;
    color:white;
    text-decoration:none;
    font-size:34px;
    font-weight:bold;
    box-sizing:border-box;
}

.call-btn{
    background:#1877f2;
}

.whatsapp-btn{
    background:#25D366;
}

.email-btn{
    background:#ff6d00;
}

@media(max-width:768px){

    #popup{
        width:92%;
        padding:22px;
    }

    #popup h2{
        font-size:24px;
    }

    #popup p{
        font-size:18px;
    }

    .action-btn{
        font-size:24px;
        padding:16px;
    }

    .close-btn{
        font-size:34px;
    }

    .hotspot{
        width:18px;
        height:18px;
    }
}

</style>
</head>

<body>

<div id="map-container">

    <img src="plano.png" id="plano">

</div>

<div id="popup">

    <div class="close-btn" onclick="closePopup()">✖</div>

    <h2 id="popup-name"></h2>

    <p><strong>Rol:</strong> <span id="popup-role"></span></p>
    <p><strong>Congregación:</strong> <span id="popup-cong"></span></p>
    <p><strong>Teléfono:</strong> <span id="popup-phone"></span></p>
    <p><strong>Email:</strong> <span id="popup-email"></span></p>

    <a id="call-btn" class="action-btn call-btn">📞 Llamar</a>

    <a id="wa-btn" class="action-btn whatsapp-btn" target="_blank">
        WhatsApp
    </a>

    <a id="mail-btn" class="action-btn email-btn">
        ✉ Email
    </a>

</div>

<script>

const hotspots = {};

const mapContainer = document.getElementById("map-container");

/* =========================
   CAPTURAR COORDENADAS
========================= */

mapContainer.addEventListener("click", function(e){

    const rect = mapContainer.getBoundingClientRect();

    const x = Math.round(
        ((e.clientX - rect.left) / rect.width) * 1486
    );

    const y = Math.round(
        ((e.clientY - rect.top) / rect.height) * 1059
    );

    console.log(`X: ${x}  Y: ${y}`);

    // círculo visual temporal
    const point = document.createElement("div");

    point.style.position = "absolute";
    point.style.width = "16px";
    point.style.height = "16px";
    point.style.borderRadius = "50%";
    point.style.background = "red";
    point.style.opacity = "0.7";
    point.style.pointerEvents = "none";
    point.style.transform = "translate(-50%, -50%)";

    point.style.left =
        ((x / 1486) * 100) + "%";

    point.style.top =
        ((y / 1059) * 100) + "%";

    mapContainer.appendChild(point);

});

</script>

</body>
</html>
