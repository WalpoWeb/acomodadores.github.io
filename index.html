<title>Plano ECC Barcelona</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f2f2f2;
    font-family:Arial, Helvetica, sans-serif;
    overflow-x:hidden;
}

.wrapper{
    width:100%;
    display:flex;
    justify-content:center;
    padding:10px;
}

.map-container{
    position:relative;
    width:100%;
    max-width:1486px;
}

.map-container img{
    width:100%;
    height:auto;
    display:block;
}

/* HOTSPOTS */

.hotspot{
    position:absolute;

    width:16px;
    height:16px;

    border-radius:50%;
    background:rgba(255,0,0,0.35);

    transform:translate(-50%, -50%);

    cursor:pointer;
    z-index:5;
}

/* MODAL */

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:999;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.modal-content{
    background:#fff;
    width:100%;
    max-width:520px;
    border-radius:24px;
    padding:30px;
    position:relative;
}

.close{
    position:absolute;
    top:18px;
    right:22px;
    font-size:34px;
    cursor:pointer;
    font-weight:bold;
}

.modal h2{
    color:#0a36b5;
    margin-bottom:18px;
    font-size:42px;
}

.modal p{
    margin-bottom:16px;
    font-size:30px;
}

.modal strong{
    font-weight:bold;
}

.actions{
    display:flex;
    flex-direction:column;
    gap:16px;
    margin-top:28px;
}

.actions a{
    text-decoration:none;
    color:#fff;
    text-align:center;
    padding:20px;
    border-radius:16px;
    font-size:30px;
    font-weight:bold;
}

.call{background:#1877f2;}
.whatsapp{background:#25D366;}
.email{background:#ff6f00;}

/* MOBILE */

@media(max-width:768px){

    .wrapper{
        padding:0;
    }

    .modal-content{
        padding:24px;
        border-radius:22px;
    }

    .modal h2{
        font-size:22px;
    }

    .modal p{
        font-size:16px;
    }

    .actions a{
        font-size:20px;
        padding:16px;
    }

    .hotspot{
        width:14px;
        height:14px;
    }
}
</style>
</head>
