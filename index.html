<style>

body{
    margin:0;
    background:#ececec;
    font-family:Arial;
}

.container{
    position:relative;
    width:100%;
    max-width:1400px;
    margin:auto;
}

.plano{
    width:100%;
    display:block;
}

/* HOTSPOTS */

.marker{
    position:absolute;
    width:2%;
    aspect-ratio:1;
    border-radius:50%;
    transform:translate(-50%,-50%);
    cursor:pointer;
    z-index:20;

    background:red;
    opacity:0;
}

/* MOBILE */

@media(max-width:768px){

.marker{
    width:4%;
}

}

/* POPUP */

.popup{

    position:fixed;
    left:50%;
    bottom:10px;
    transform:translateX(-50%);

    background:white;

    width:90%;
    max-width:420px;

    border-radius:20px;

    padding:20px;

    display:none;

    z-index:9999;

    box-shadow:0 0 25px rgba(0,0,0,.35);
}

.popup h2{
    margin-top:0;
    color:#003399;
}

.close{
    float:right;
    cursor:pointer;
    font-size:30px;
    font-weight:bold;
}

.info{
    line-height:1.8;
    margin-top:10px;
}

/* BOTONES */

.btn{

    display:block;
    text-align:center;

    padding:14px;

    margin-top:12px;

    border-radius:12px;

    color:white;

    text-decoration:none;

    font-weight:bold;
}

.llamar{
    background:#0d6efd;
}

.whatsapp{
    background:#25D366;
}

.email{
    background:#ff6b00;
}

</style>

</head>
