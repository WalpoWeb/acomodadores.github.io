<title>Plano ECC Barcelona</title>

<style>

body{
    margin:0;
    background:#ececec;
    font-family:Arial;
}

/* CONTENEDOR */

.container{

    position:relative;

    width:1200px;

    margin:20px auto;
}

/* IMAGEN */

.plano{

    width:1200px;

    display:block;
}

/* HOTSPOTS INVISIBLES */

.marker{

    position:absolute;

    width:42px;

    height:42px;

    border-radius:50%;

    cursor:pointer;

    background:red;

    opacity:0;

    z-index:999;

    transform:translate(-50%,-50%);
}

/* POPUP */

.popup{

    position:fixed;

    left:50%;

    bottom:20px;

    transform:translateX(-50%);

    background:white;

    width:90%;

    max-width:420px;

    border-radius:20px;

    padding:20px;

    box-shadow:0 0 25px rgba(0,0,0,0.35);

    display:none;

    z-index:99999;
}

.popup h2{

    margin-top:0;

    color:#003399;
}

.close{

    float:right;

    cursor:pointer;

    font-size:24px;

    font-weight:bold;
}

.info{

    line-height:1.8;

    margin-top:15px;
}

/* BOTONES */

.btn{

    display:block;

    text-align:center;

    padding:14px;

    margin-top:12px;

    border-radius:12px;

    text-decoration:none;

    color:white;

    font-weight:bold;
}

.llamar{
    background:#007bff;
}

.whatsapp{
    background:#25D366;
}

.email{
    background:#ff6600;
}

/* MOBILE */

@media(max-width:1280px){

    .container{

        width:100%;
        overflow-x:auto;
    }

    .plano{

        width:1200px;
    }
}

</style>

</head>

<script src="https://cdn.jsdelivr.net/npm/pinch-zoom-js@2.3.5/dist/pinch-zoom.umd.js"></script>

<script>

new PinchZoom.default(document.querySelector('.container'), {
    draggableUnzoomed: false
});

</script>

<script>

function mostrar(nombre,tel,email,congregacion,rol){

document.getElementById("popup").style.display="block";

document.getElementById("nombre").innerHTML=nombre;

document.getElementById("rol").innerHTML=
"<b>Rol:</b> "+rol;

document.getElementById("congregacion").innerHTML=
"<b>Congregación:</b> "+congregacion;

document.getElementById("telefonoTexto").innerHTML=
"<b>Teléfono:</b> "+tel;

document.getElementById("emailTexto").innerHTML=
"<b>Email:</b> "+email;

document.getElementById("llamar").href=
"tel:"+tel;

document.getElementById("whatsapp").href=
"https://wa.me/"+tel.replace("+","");

document.getElementById("emailBtn").href=
"mailto:"+email;
}

function cerrar(){

document.getElementById("popup").style.display="none";
}
