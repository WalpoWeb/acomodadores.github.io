<style>

body{
    margin:0;
    background:#ececec;
    font-family:Arial,sans-serif;
}

.container{

    position:relative;
    width:100%;
    max-width:1486px;
    margin:auto;
}

.plano{

    width:100%;
    display:block;
}

/* HOTSPOTS */

.hotspot{

    position:absolute;

    width:22px;
    height:22px;

    background:red;

    border-radius:50%;

    opacity:.35;

    transform:translate(-50%,-50%);

    cursor:pointer;

    transition:.2s;
}

.hotspot:hover{

    opacity:.6;
}

/* POPUP */

.popup{

    position:fixed;

    left:50%;
    bottom:10px;

    transform:translateX(-50%);

    width:92%;
    max-width:430px;

    background:white;

    border-radius:22px;

    padding:22px;

    z-index:9999;

    display:none;

    box-shadow:0 0 30px rgba(0,0,0,.35);
}

.popup h2{

    margin-top:0;
    color:#003399;
}

.close{

    position:absolute;

    top:15px;
    right:20px;

    font-size:30px;
    font-weight:bold;

    cursor:pointer;
}

.info{

    line-height:1.8;
    margin-top:15px;
}

.btn{

    display:block;

    text-align:center;

    text-decoration:none;

    color:white;

    font-weight:bold;

    padding:16px;

    border-radius:14px;

    margin-top:14px;

    font-size:22px;
}

.llamar{
    background:#1677ff;
}

.whatsapp{
    background:#28d146;
}

.email{
    background:#ff7300;
}

</style>
</head>

<script>

function mostrar(nombre,telefono,email,congregacion,rol){

document.getElementById("popup").style.display="block";

"tel:"+telefono;

"https://wa.me/"+telefono.replace(/\D/g,'');
